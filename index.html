       .cardsanim{
        display: flex;
        gap: 50px 60px;
        justify-content: center;
        margin-top: 200px;
        flex-wrap: wrap;
       } 
       .cardsanim > a {
        width: 200px;
        height: 310px;
        background-color: rgb(201, 194, 194);
        border-radius: 7px;
        filter: saturate(0);
        transition: transform 0.3s ease-in-out;
       }
       .cardsanim > a:hover {
        
        background-color: rgb(253, 212, 157);
       
        transform: translateY(-30px);
        transform: scale(1.07);
        filter: saturate(100%);
       }
    </style>
